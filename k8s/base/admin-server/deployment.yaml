apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
  namespace: petclinic-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-server
  template:
    metadata:
      labels:
        app: admin-server
    spec:
      serviceAccountName: admin-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://config-server:8888/actuator/health; do sleep 5; done
        - name: wait-for-discovery-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -qO- http://discovery-server:8761/actuator/health; do sleep 5; done
      containers:
        - name: admin-server
          image: "522826274224.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/admin-server:PLACEHOLDER"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: admin-server
                  key: SPRING_PROFILES_ACTIVE
            - name: CONFIG_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: admin-server
                  key: CONFIG_SERVER_URL
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
