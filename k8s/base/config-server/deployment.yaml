# PETPLAT-39: Config Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: petclinic-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      serviceAccountName: config-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: config-server
          # PETPLAT-20 ECR repo: petclinic-dev/config-server
          # PETPLAT-85 CI/CD: replace PLACEHOLDER with commit SHA from build pipeline
          image: "522826274224.dkr.ecr.eu-central-1.amazonaws.com/petclinic-dev/config-server:PLACEHOLDER"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: GIT_REPO
              valueFrom:
                configMapKeyRef:
                  name: config-server
                  key: GIT_REPO
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
