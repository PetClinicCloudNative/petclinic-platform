# PETPLAT-36: ClusterSecretStore for AWS Secrets Manager
# Cluster-scoped — any namespace can reference this to sync secrets.

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
