# PETPLAT-35: ExternalSecret for RDS credentials
# Syncs petclinic/dev/rds-credentials (JSON with username and password) from
# AWS Secrets Manager into the petclinic-dev namespace.

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rds-credentials
  namespace: petclinic-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: rds-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: petclinic/dev/rds-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: petclinic/dev/rds-credentials
        property: password
